<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫・売上管理</title>
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem('inventory-theme') || 'dark';
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="castle-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="app-header">
      <span class="save-indicator" id="saveIndicator">読み込み中...</span>
      <div class="header-content">
        <div class="header-crest" aria-hidden="true">
          <svg class="castle-emblem" viewBox="0 0 120 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="60" cy="68" rx="46" ry="4" fill="var(--castle-shadow)" opacity="0.35"/>
            <path class="castle-roof-main" d="M18 38 L60 14 L102 38 V42 H18 Z"/>
            <path class="castle-roof-tower-l" d="M8 44 L20 30 L32 44 V48 H8 Z"/>
            <path class="castle-roof-tower-r" d="M88 44 L100 30 L112 44 V48 H88 Z"/>
            <rect class="castle-wall" x="22" y="38" width="76" height="26" rx="1"/>
            <rect class="castle-wall" x="10" y="44" width="24" height="20" rx="1"/>
            <rect class="castle-wall" x="86" y="44" width="24" height="20" rx="1"/>
            <rect class="castle-battlement" x="22" y="34" width="8" height="6"/>
            <rect class="castle-battlement" x="36" y="34" width="8" height="6"/>
            <rect class="castle-battlement" x="50" y="34" width="8" height="6"/>
            <rect class="castle-battlement" x="64" y="34" width="8" height="6"/>
            <rect class="castle-battlement" x="78" y="34" width="8" height="6"/>
            <rect class="castle-battlement" x="92" y="34" width="6" height="6"/>
            <rect class="castle-window" x="30" y="46" width="8" height="10" rx="1"/>
            <rect class="castle-window" x="46" y="46" width="8" height="10" rx="1"/>
            <rect class="castle-window" x="66" y="46" width="8" height="10" rx="1"/>
            <rect class="castle-window" x="82" y="46" width="8" height="10" rx="1"/>
            <rect class="castle-window" x="16" y="50" width="6" height="8" rx="1"/>
            <rect class="castle-window" x="98" y="50" width="6" height="8" rx="1"/>
            <path class="castle-door" d="M54 64 V52 C54 48 66 48 66 52 V64 Z"/>
            <line class="castle-door-arch" x1="54" y1="52" x2="66" y2="52"/>
            <path class="castle-flag-pole" d="M60 14 V6"/>
            <path class="castle-flag" d="M60 6 L72 9 V15 L60 12 Z"/>
          </svg>
        </div>
        <div class="header-title-block">
          <div class="header-title-text">
            <h1>在庫・売上管理</h1>
            <p class="subtitle">仕入・売上を一覧で管理し、粗利を自動計算します</p>
          </div>
          <div class="summary-bar" id="summaryBar"></div>
        </div>
        <div class="header-actions">
          <div class="history-actions">
            <button type="button" id="undoDeleteBtn" class="btn-history" title="操作を戻す" aria-label="操作を戻す" disabled>
              <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14 6L8 12l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button type="button" id="redoDeleteBtn" class="btn-history" title="操作をやり直す" aria-label="操作をやり直す" disabled>
              <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <button type="button" id="addRowBtn" class="btn btn-primary" aria-label="行を追加">
            <svg class="icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            行を追加
          </button>
          <button type="button" id="exportExcelBtn" class="btn btn-secondary" title="現在の一覧をExcelファイルで保存">Excelダウンロード</button>
          <button type="button" id="resetColWidthsBtn" class="btn btn-secondary" title="列幅を初期状態に戻す">列幅リセット</button>
          <div class="theme-toggle-block">
            <button type="button" id="themeToggle" class="btn-theme" aria-label="テーマを切り替え"><span id="themeIcon">☀️</span></button>
            <button type="button" id="scrollToBottomBtn" class="btn-theme" title="一番下までスクロール" aria-label="テーブルの一番下までスクロール">
              <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 4v14M6 12l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="table-wrapper">
      <table class="inventory-table" id="inventoryTable">
        <colgroup id="tableColgroup"></colgroup>
        <thead><tr id="tableHeadRow"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </main>
  </div>

  <div id="imageLightbox" class="image-lightbox" hidden>
    <div class="image-lightbox-backdrop" data-close-lightbox></div>
    <div class="image-lightbox-dialog" role="dialog" aria-modal="true" aria-label="画像プレビュー">
      <button type="button" class="image-lightbox-close" id="imageLightboxClose" aria-label="閉じる">&times;</button>
      <img id="imageLightboxImg" src="" alt="商品画像プレビュー">
      <p class="image-lightbox-hint">クリックまたは Esc で閉じる</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
